# GitHub Hot Picks 可选配置
# 复制为 config.yaml 后按需覆盖默认值；只有 engine=api 时才需要 LLM API Key。

# 默认使用本机已登录的 Codex，不需要 API Key。
runtime:
  engine: "codex"              # codex / api
  codex_command: "codex"
  input_dir: "input"

# 可选 API fallback，仅在 runtime.engine=api 时使用。
llm:
  provider: "openai"
  model: "gpt-4o"
  api_key: ""           # 填入你的 OpenAI API Key
  # 如果使用 Anthropic：
  # provider: "anthropic"
  # model: "claude-sonnet-4-20250514"
  # api_key: ""         # 填入你的 Anthropic API Key

# GitHub API 配置（可选，提高 trending 抓取稳定性）
github:
  token: ""             # GitHub Personal Access Token（可选，无token也能运行）

# 输出配置
output:
  dir: "output"
  filename_template: "GitHub热点-{date}.md"

# 数据源配置
sources:
  github_trending:
    enabled: true
    since: "daily"              # daily / weekly / monthly
    languages:                   # 关注的编程语言（空列表=全部语言）
      - ""
      - "python"
      - "javascript"
      - "typescript"
      - "rust"
      - "go"

  openithubs_weekly:
    enabled: true
    repo: "OpenGithubs/weekly"

  github_daily:
    enabled: true
    repo: "GitHubDaily/GitHubDaily"

  ossnav:
    enabled: true
    repo: "maxiaobang7/ossnav"

  hackernews:
    enabled: true
    top_n: 30

  # 推荐源是长期目录，不等同于“今日热点”。程序每天只选择未见过的项目。
  recommend_selection:
    max_per_source: 10
    state_file: ".state/seen-projects.json"
    enrich_metadata: true

# 报告板块配置
sections:
  - id: "ai_coding_agent"
    title: "AI 编码智能体"
    subtitle: "近期最火方向"
    min_items: 2
    max_items: 4

  - id: "ai_app_tool"
    title: "AI 应用与工具"
    min_items: 5
    max_items: 7

  - id: "dev_efficiency"
    title: "开发效率工具"
    min_items: 3
    max_items: 4

  - id: "ossnav_pick"
    title: "实用开源软件"
    subtitle: "OSSNAV 精选"
    min_items: 3
    max_items: 4
